<!doctype html>
<html lang="id" class="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SAVORAFOODS | Premium Gourmet Orders</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: { colors: { gold: "#D4AF37", premiumDark: "#0A0A0A" } },
        },
      };
    </script>
  </head>
  <body
    class="bg-white text-gray-900 dark:bg-premiumDark dark:text-white pb-32"
  >
    <nav
      class="fixed w-full top-0 z-50 px-[5vw] glass-nav border-b border-gray-100 dark:border-white/5 flex items-center justify-between"
    >
      <div
        class="text-xl font-serif font-bold tracking-[0.3em] dark:text-gold uppercase"
      >
        SAVORAFOODS
      </div>
      <button
        onclick="toggleDarkMode()"
        class="text-xl p-2 rounded-full hover:bg-gray-100 dark:hover:bg-white/10 transition"
      >
        <span id="theme-icon">🌙</span>
      </button>
    </nav>

    <header class="pt-24 pb-6 px-6 max-w-4xl mx-auto">
      <div class="bg-gray-100 dark:bg-white/5 p-1 rounded-2xl flex mb-8">
        <button
          onclick="setOrderMode('pickup')"
          id="btn-pickup"
          class="flex-1 py-3 rounded-xl font-bold text-sm bg-gold text-white shadow-sm"
        >
          Pick Up
        </button>
        <button
          onclick="setOrderMode('delivery')"
          id="btn-delivery"
          class="flex-1 py-3 rounded-xl font-bold text-sm text-gray-400"
        >
          Delivery
        </button>
      </div>
      <div class="text-center">
        <h1 class="font-serif text-4xl font-bold leading-tight">
          Good Day, <br /><span class="text-gold italic text-5xl font-light"
            >Savorist!</span
          >
        </h1>
      </div>
    </header>

    <div
      class="sticky top-[70px] z-40 bg-white/90 dark:bg-premiumDark/90 backdrop-blur-md py-4 overflow-x-auto no-scrollbar px-6 flex gap-3 border-b border-gray-100 dark:border-white/5"
    >
      <button
        onclick="filterMenu('all', event)"
        class="category-pill active px-6 py-2 rounded-full text-[10px] font-bold uppercase whitespace-nowrap"
      >
        Semua
      </button>
      <button
        onclick="filterMenu('rogut', event)"
        class="category-pill px-6 py-2 rounded-full text-[10px] font-bold uppercase whitespace-nowrap text-gold"
      >
        Risol Rogut
      </button>
      <button
        onclick="filterMenu('mayo', event)"
        class="category-pill px-6 py-2 rounded-full text-[10px] font-bold uppercase whitespace-nowrap text-gold"
      >
        Risol Mayo
      </button>
      <button
        onclick="filterMenu('taso-ori', event)"
        class="category-pill px-6 py-2 rounded-full text-[10px] font-bold uppercase whitespace-nowrap text-gold"
      >
        Taso Original
      </button>
      <button
        onclick="filterMenu('taso-lumer', event)"
        class="category-pill px-6 py-2 rounded-full text-[10px] font-bold uppercase whitespace-nowrap text-gold"
      >
        Taso Lumer
      </button>
    </div>

    <section
      id="menu-container"
      class="py-6 px-6 max-w-2xl mx-auto space-y-6"
    ></section>

    <div
      id="sticky-cart"
      class="fixed bottom-8 left-0 w-full px-6 translate-y-[200%] sticky-cart z-50"
    >
      <button
        onclick="openCheckout()"
        class="max-w-md mx-auto w-full gold-btn h-16 rounded-2xl flex items-center justify-between px-8 text-white shadow-2xl"
      >
        <div class="flex items-center gap-4">
          <span
            id="cart-count"
            class="bg-white text-gold w-6 h-6 rounded-md flex items-center justify-center text-[10px] font-bold"
            >0</span
          >
          <span class="text-xs font-bold uppercase tracking-widest text-black"
            >Cek Keranjang</span
          >
        </div>
        <span id="cart-total" class="font-bold text-black">Rp 0</span>
      </button>
    </div>

    <div
      id="checkout-modal"
      class="fixed inset-0 z-[60] bg-black/80 backdrop-blur-sm hidden flex items-end"
    >
      <div
        class="w-full bg-white dark:bg-premiumDark rounded-t-[2.5rem] p-6 max-h-[90vh] overflow-y-auto no-scrollbar"
      >
        <div
          class="w-10 h-1 bg-gray-300 dark:bg-white/20 mx-auto rounded-full mb-6"
        ></div>
        <h3
          class="font-serif text-xl mb-6 text-center text-gray-900 dark:text-white uppercase tracking-widest"
        >
          Detail Pesanan
        </h3>
        <div id="modal-items" class="space-y-4 mb-6"></div>
        <div class="space-y-4 mb-6">
          <input
            type="text"
            id="cust-name"
            placeholder="Nama Lengkap"
            class="w-full p-4 rounded-xl bg-gray-50 dark:bg-white/5 border border-gray-200 dark:border-white/10 text-sm dark:text-white focus:border-gold outline-none"
          />
          <div id="address-section">
            <select
              id="pickup-location"
              class="w-full p-4 rounded-xl bg-gray-50 dark:bg-white/5 border border-gold/30 text-sm font-bold hidden dark:text-white dark:bg-neutral-800"
            >
              <option value="Samarinda Seberang">
                Savora Store - Samarinda Seberang
              </option>
              <option value="Tenggarong Kota">
                Savora Hub - Tenggarong Kota
              </option>
            </select>
            <textarea
              id="delivery-address"
              placeholder="Alamat Lengkap Pengiriman..."
              class="w-full p-4 rounded-xl bg-gray-50 dark:bg-white/5 border border-gold/30 text-sm h-20 hidden dark:text-white focus:border-gold outline-none"
            ></textarea>
          </div>
        </div>
        <div class="grid grid-cols-3 gap-2 mb-6">
          <button
            onclick="setPayment('Transfer', event)"
            class="pay-btn p-3 rounded-xl border border-gray-200 dark:border-white/10 text-[10px] font-bold uppercase dark:text-white"
          >
            Transfer
          </button>
          <button
            onclick="setPayment('QRIS', event)"
            class="pay-btn p-3 rounded-xl border border-gray-200 dark:border-white/10 text-[10px] font-bold uppercase dark:text-white"
          >
            QRIS
          </button>
          <button
            onclick="setPayment('Cash', event)"
            class="pay-btn p-3 rounded-xl border border-gray-200 dark:border-white/10 text-[10px] font-bold uppercase dark:text-white"
          >
            Cash
          </button>
        </div>
        <div
          class="flex justify-between items-center mb-6 bg-gray-100 dark:bg-white/5 p-4 rounded-xl"
        >
          <span
            class="text-xs text-gray-500 uppercase font-bold tracking-widest"
            >Total Bayar</span
          >
          <span id="modal-total" class="text-xl font-bold text-gold">Rp 0</span>
        </div>
        <button
          onclick="handleOrderProcess()"
          id="btn-finish"
          class="w-full gold-btn py-4 rounded-xl text-white font-bold uppercase tracking-widest shadow-xl"
        >
          Konfirmasi Pesanan
        </button>
        <button
          onclick="closeCheckout()"
          class="w-full py-3 text-gray-400 text-[10px] font-bold uppercase mt-2"
        >
          Tambah Menu
        </button>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
  </body>
</html>
