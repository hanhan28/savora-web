<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    
    <title>Savora Foods | Risol & Taso Premium</title>
    <meta name="description" content="Nikmati kelezatan Risol Mayo dan Taso Premium terbaik di Samarinda. Krispi di luar, lumer di dalam.">
    <meta property="og:title" content="Savora Foods | Risol & Taso Premium">
    <meta property="og:description" content="Citarasa Mewah di Setiap Gigitan. Order sekarang!">
    <meta property="og:image" content="aset-gambar/logo-savora/logo_savorafoods.png">
    <meta property="og:url" content="https://savorafoods.vercel.app">
    
    <link rel="icon" type="image/png" href="aset-gambar/logo-savora/logo_savorafoods.png">

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700;900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              gold: "#D4AF37",
              "dark-bg": "#0F0F0F",
              "dark-card": "#1A1A1A",
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body
    class="bg-slate-50 text-slate-900 dark:bg-dark-bg dark:text-slate-100 transition-colors duration-500 antialiased"
  >
    <nav
      class="fixed top-0 w-full z-[100] glass-nav border-b border-slate-200 dark:border-white/5"
    >
      <div
        class="max-w-7xl mx-auto px-4 h-20 flex items-center justify-between"
      >
        <div class="flex items-center gap-3">
          <img
            src="aset-gambar/logo-savora/logo_savorafoods.png"
            alt="Logo"
            class="nav-logo"
          />
          <div class="flex flex-col">
            <span
              class="font-serif text-lg font-bold tracking-tight uppercase leading-none"
              >Savora <span class="text-gold">Foods</span></span
            >
            <span
              class="text-[8px] font-bold tracking-[0.3em] text-slate-400 uppercase leading-none mt-1"
              >Premium Quality</span
            >
          </div>
        </div>
        <button
          onclick="toggleDarkMode()"
          class="w-10 h-10 flex items-center justify-center rounded-full bg-slate-100 dark:bg-white/5 transition active:scale-90"
        >
          <span id="theme-icon">🌙</span>
        </button>
      </div>
    </nav>

    <section class="pt-36 pb-8 px-6 text-center max-w-4xl mx-auto">
      <div
        class="inline-block px-3 py-1 rounded-full bg-gold/10 text-gold text-[9px] font-bold uppercase tracking-widest mb-4"
      >
        Fine Taste Beautifully Crafted
      </div>
      <h1
        class="font-serif text-4xl md:text-6xl font-black mb-4 leading-tight tracking-tighter"
      >
        Citarasa
        <span
          class="text-gold italic underline decoration-gold/30 underline-offset-8"
          >Mewah</span
        >
        <br />
        di Setiap Gigitan.
      </h1>
      <p
        class="text-slate-500 dark:text-slate-400 text-xs md:text-sm max-w-md mx-auto leading-relaxed"
      >
        Nikmati kelezatan Risol Mayo dan Taso Premium terbaik. Krispi di luar,
        lumer di dalam.
      </p>
    </section>

    <main class="px-4 pb-20 max-w-7xl mx-auto">
      <div
        class="flex gap-2 overflow-x-auto no-scrollbar mb-8 py-2 sticky top-20 z-[90] bg-slate-50/90 dark:bg-dark-bg/90 backdrop-blur-md"
      >
        <button onclick="filterMenu('all', event)" class="category-pill active">
          Semua Menu
        </button>
        <button onclick="filterMenu('mayo', event)" class="category-pill">
          Risol Mayo
        </button>
        <button onclick="filterMenu('rogut', event)" class="category-pill">
          Risol Rogut
        </button>
        <button onclick="filterMenu('taso-ori', event)" class="category-pill">
          Taso Original
        </button>
        <button onclick="filterMenu('taso-lumer', event)" class="category-pill">
          Taso Lumer
        </button>
      </div>
      <div
        id="menu-container"
        class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5"
      ></div>
    </main>

    <footer
      class="bg-white dark:bg-dark-card border-t border-slate-200 dark:border-white/5 py-12 pb-40 text-center"
    >
      <h3
        class="font-serif text-xl font-bold mb-6 text-gold uppercase tracking-tighter"
      >
        Layanan Informasi
      </h3>
      <div class="flex justify-center gap-10 mb-8">
        <a
          href="https://wa.me/6285247763672"
          target="_blank"
          class="social-btn text-green-500"
          ><i class="fab fa-whatsapp"></i
        ></a>
        <a
          href="https://www.instagram.com/savorafoods_"
          target="_blank"
          class="social-btn text-pink-500"
          ><i class="fab fa-instagram"></i
        ></a>
        <a
          href="https://www.facebook.com/share/18tpYbKWEh/?mibextid=wwXIfr"
          target="_blank"
          class="social-btn text-blue-600"
          ><i class="fab fa-facebook-f"></i
        ></a>
      </div>
      <p class="text-[9px] text-slate-400 tracking-[0.3em] uppercase">
        Samarinda - Balikpapan &bull; Savora Foods &copy; 2026
      </p>
    </footer>

    <div
      id="sticky-cart"
      class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] max-w-md z-[110] transition-all duration-700 translate-y-[200%]"
    >
      <div class="gold-gradient p-[1px] rounded-[2rem] shadow-2xl">
        <div
          class="bg-white dark:bg-dark-card rounded-[1.95rem] p-4 flex items-center justify-between"
        >
          <div class="flex items-center gap-4 ml-2">
            <div class="relative">
              <i class="fas fa-shopping-basket text-gold text-2xl"></i
              ><span
                id="cart-count"
                class="absolute -top-2 -right-2 bg-red-500 text-white text-[10px] font-bold w-5 h-5 rounded-full flex items-center justify-center border-2 border-white dark:border-dark-card"
                >0</span
              >
            </div>
            <p id="cart-total" class="font-bold text-lg leading-none">Rp 0</p>
          </div>
          <button
            onclick="openCheckout()"
            class="gold-gradient text-white px-8 py-3 rounded-2xl font-bold text-xs uppercase shadow-lg active:scale-90 transition-all"
          >
            Checkout
          </button>
        </div>
      </div>
    </div>

    <div id="checkout-modal" class="fixed inset-0 z-[200] hidden">
      <div
        class="absolute inset-0 bg-black/70 backdrop-blur-md"
        onclick="closeCheckout()"
      ></div>
      <div
        class="absolute bottom-0 left-0 right-0 md:top-1/2 md:-translate-y-1/2 md:mx-auto md:max-w-md bg-white dark:bg-dark-bg rounded-t-[2.5rem] md:rounded-[2.5rem] p-8 shadow-2xl transition-all flex flex-col max-h-[90vh]"
      >
        <div class="flex justify-between items-center mb-6 shrink-0">
          <h3 class="font-serif text-2xl font-bold uppercase text-gold">
            Orderan
          </h3>
          <button onclick="closeCheckout()" class="text-3xl text-slate-400">
            &times;
          </button>
        </div>
        <div class="flex-1 overflow-y-auto no-scrollbar space-y-4 pb-6">
          <div
            id="modal-items"
            class="space-y-3 text-slate-700 dark:text-slate-200"
          ></div>
          <hr class="border-slate-100 dark:border-white/5" />
          <input
            type="text"
            id="cust-name"
            placeholder="Nama Lengkap"
            class="w-full bg-slate-50 dark:bg-white/5 border dark:border-white/10 rounded-2xl px-5 py-4 text-sm outline-none"
          />
          <div class="flex bg-slate-100 dark:bg-white/5 rounded-2xl p-1">
            <button
              id="btn-pickup"
              onclick="setOrderMode('pickup')"
              class="flex-1 py-3 rounded-xl font-bold text-[10px]"
            >
              PICKUP
            </button>
            <button
              id="btn-delivery"
              onclick="setOrderMode('delivery')"
              class="flex-1 py-3 rounded-xl font-bold text-[10px]"
            >
              DELIVERY
            </button>
          </div>
          <textarea
            id="delivery-address"
            placeholder="Wajib Isi Alamat Lengkap..."
            class="hidden w-full bg-slate-50 dark:bg-white/5 border dark:border-white/10 rounded-2xl px-5 py-4 text-sm outline-none h-20"
          ></textarea>
          <div class="grid grid-cols-3 gap-2">
            <button
              onclick="setPayment('CASH', event)"
              class="pay-btn border dark:border-white/10 rounded-xl py-3 text-[9px] font-bold"
            >
              CASH
            </button>
            <button
              onclick="setPayment('QRIS', event)"
              class="pay-btn border dark:border-white/10 rounded-xl py-3 text-[9px] font-bold"
            >
              QRIS
            </button>
            <button
              onclick="setPayment('TRANSFER', event)"
              class="pay-btn border dark:border-white/10 rounded-xl py-3 text-[9px] font-bold"
            >
              TRANSFER
            </button>
          </div>
        </div>
        <div
          class="shrink-0 pt-4 border-t dark:border-white/5 bg-white dark:bg-dark-bg text-center"
        >
          <p
            id="modal-total"
            class="text-xl font-black text-gold mb-3 text-center"
          >
            Rp 0
          </p>
          <button
            id="btn-finish"
            onclick="handleOrderProcess()"
            class="w-full gold-gradient text-white py-5 rounded-2xl font-bold text-xs shadow-lg uppercase tracking-widest active:scale-95 transition-all"
          >
            Konfirmasi Pesanan
          </button>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
  </body>
</html>
